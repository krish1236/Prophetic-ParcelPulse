[project]
name = "parcelpulse"
version = "0.1.0"
description = "Event-sourced change-feed and decision-alert engine for parcel watchlists"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
    "sqlalchemy[asyncio]>=2.0",
    "asyncpg>=0.30",
    "alembic>=1.14",
    "geoalchemy2>=0.16",
    "pydantic-settings>=2.6",
    "psycopg2-binary>=2.9",
    "httpx>=0.28",
    "tenacity>=9.0",
    "apscheduler>=3.10",
]

[project.scripts]
parcelpulse-scheduler = "parcelpulse.workers.scheduler:main"

[project.optional-dependencies]
dev = [
    "ruff>=0.8",
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "N"]

[tool.ruff.lint.per-file-ignores]
# Autogenerated by alembic; long lines are unavoidable.
"alembic/versions/*.py" = ["E501"]
# FastAPI idiomatically uses Depends() in argument defaults.
"src/parcelpulse/routes/*.py" = ["B008"]
# Tests have inline WKT/SQL literals that don't fit 100 cols cleanly.
"tests/*.py" = ["E501"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
asyncio_mode = "auto"
