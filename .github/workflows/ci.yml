name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: parcelpulse
          POSTGRES_PASSWORD: parcelpulse
          POSTGRES_DB: parcelpulse
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U parcelpulse -d parcelpulse"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://parcelpulse:parcelpulse@localhost:5432/parcelpulse
      REDIS_URL: redis://localhost:6379/0

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: api/pyproject.toml
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - name: alembic upgrade head
        run: alembic upgrade head
      - run: pytest -q

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm build

  api-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: api
          push: false
          tags: parcelpulse-api:ci
